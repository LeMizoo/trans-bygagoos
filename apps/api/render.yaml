services:
  - type: web
    name: trans-bygagoos-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bygagoos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: tovoniaina.rahendrison@gmail.com
      - key: ADMIN_NAME
        value: Tovoniaina RAHENDRISON
      - key: ADMIN_PASSWORD
        value: ByGagoos@2024!

databases:
  - name: bygagoos-db
    databaseName: trans_bygagoos
