<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo/b-trans.png" />
    <link rel="shortcut icon" type="image/png" href="/assets/logo/b-trans.png" />
    <link rel="apple-touch-icon" href="/assets/logo/b-trans.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ByGagoos Ride</title>
    <style>
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0a0a; display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #splash-screen img {
        width: 100px; height: 100px; object-fit: contain;
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-screen .splash-title {
        color: #DAA520; font-size: 22px; margin-top: 16px;
        font-weight: 700; letter-spacing: 2px; font-family: system-ui, sans-serif;
      }
      #splash-screen .splash-subtitle {
        color: #888; font-size: 13px; margin-top: 6px; font-family: system-ui, sans-serif;
      }
      #splash-screen .splash-loader {
        margin-top: 24px; width: 50px; height: 3px;
        background: #222; border-radius: 2px; overflow: hidden;
      }
      #splash-screen .splash-loader::after {
        content: ''; display: block; height: 100%; width: 30%;
        background: #DAA520; border-radius: 2px;
        animation: splashLoad 1.2s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.8; }
      }
      @keyframes splashLoad {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <img src="/assets/logo/b-trans.png" alt="ByGagoos Ride" />
      <div class="splash-title">ByGagoos Ride</div>
      <div class="splash-subtitle">Application Chauffeur</div>
      <div class="splash-loader"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { if (splash) splash.remove(); }, 600);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
